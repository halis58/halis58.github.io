<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYA ARCHITECTURES</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

/* TEXT */
.hero-content {
  position: relative;
  text-align: center;
  animation: fadeUp 1.5s ease forwards;
}

.hero-content h1 {
  font-size: 64px;
  letter-spacing: 4px;
  margin-bottom: 20px;
}

.hero-content p {
  font-size: 18px;
  color: #ccc;
}

/* ANIMATION */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* SCROLL TEXT */
.scroll {
  position: absolute;
  bottom: 30px;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.6;
}

/* SECTION */
.section {
  padding: 100px 40px;
  max-width: 1200px;
  margin: auto;
}

.section h2 {
  font-size: 32px;
  margin-bottom: 20px;
}

.section p {
  color: #bbb;
  line-height: 1.7;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
  margin-top: 40px;
}

.card {
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 350px;
  object-fit: cover;
  transition: 0.5s;
}

.card:hover img {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-content">
    <h1>KAYA ARCHITECTURES</h1>
    <p>Architecture & Interior Design</p>
  </div>

  <div class="scroll">SCROLL</div>
</div>

<div class="section">
  <h2>Hakkımızda</h2>
  <p>
    Modern, zamansız ve güçlü mekan deneyimleri tasarlıyoruz.
    Estetik ve işlevi birleştirerek premium yaşam alanları oluşturuyoruz.
  </p>
</div>

<div class="section">
  <h2>Projeler</h2>

  <div class="projects">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop">
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop">
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?q=80&w=1200&auto=format&fit=crop">
    </div>
  </div>
</div>

</body>
</html>
