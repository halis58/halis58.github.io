<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYA ARCHITECTURES</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    overflow-x: hidden;
  }

  .nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    z-index: 20;
  }

  .brand {
    opacity: 0;
    transition: opacity 0.6s ease;
    color: #111;
    letter-spacing: 0.3em;
    font-size: 18px;
  }

  .brand.show {
    opacity: 1;
  }

  .hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #111;
  }

  .hero h1 {
    font-size: 48px;
    font-weight: 400;
    letter-spacing: 0.08em;
  }

  /* Intro katmanı */
  .intro {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    overflow: hidden;
    clip-path: inset(0 0 0 0);
    will-change: clip-path;
  }

  .intro.opening {
    animation: introLift 2.4s cubic-bezier(.22,.61,.36,1) forwards;
  }

  .intro-logo {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: clamp(20px, 2vw, 30px);
    letter-spacing: 0.35em;
    font-weight: 400;
    pointer-events: none;
  }

  @keyframes introLift {
    0% {
      clip-path: inset(0 0 0 0);
    }
    100% {
      clip-path: inset(100% 0 0 0);
    }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="brand" id="navBrand">KAYA ARCHITECTURES</div>
</header>

<section class="hero">
  <h1>site açıldı</h1>
</section>

<div class="intro" id="intro">
  <div class="intro-logo">KAYA ARCHITECTURES</div>
</div>

<script>
  window.addEventListener("load", () => {
    const intro = document.getElementById("intro");
    const navBrand = document.getElementById("navBrand");

    setTimeout(() => {
      intro.classList.add("opening");
    }, 250);

    setTimeout(() => {
      intro.remove();
      navBrand.classList.add("show");
    }, 2750);
  });
</script>

</body>
</html>
