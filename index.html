<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYA ARCHITECTURES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:24px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}

.brand{
  opacity:0;
  transition:0.6s;
}

.brand.show{
  opacity:1;
}

/* INTRO */
.intro-loader{
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
  overflow:hidden;
}

.intro-loader-fill{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  background:#111;
  transition:height 2s ease;
}

.intro-loader-fill.rise{
  height:100%;
}

.intro-logo-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.intro-logo{
  color:white;
  font-size:28px;
  letter-spacing:6px;
  transition:1s;
}

.intro-logo.fade{
  opacity:0;
  transform:scale(0.96);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

</style>
</head>

<body>

<header class="nav">
  <div class="brand" id="navBrand">KAYA ARCHITECTURES</div>
</header>

<section class="hero">
  <h1>site açıldı</h1>
</section>

<!-- INTRO -->
<div class="intro-loader" id="loader">
  <div class="intro-loader-fill" id="fill"></div>
</div>

<div class="intro-logo-overlay" id="overlay">
  <div class="intro-logo" id="logo">
    KAYA ARCHITECTURES
  </div>
</div>

<script>
window.addEventListener("load", () => {

  const fill = document.getElementById("fill");
  const logo = document.getElementById("logo");
  const loader = document.getElementById("loader");
  const overlay = document.getElementById("overlay");
  const navBrand = document.getElementById("navBrand");

  // siyah yükseliyor
  setTimeout(()=>{
    fill.classList.add("rise");
  },200);

  // logo kayboluyor
  setTimeout(()=>{
    logo.classList.add("fade");
  },1400);

  // intro kapanıyor
  setTimeout(()=>{
    loader.style.opacity="0";
    loader.style.transition="0.8s";
  },2200);

  // tamamen temizleniyor
  setTimeout(()=>{
    loader.remove();
    overlay.remove();
    navBrand.classList.add("show");
  },3000);

});
</script>

</body>
</html>
